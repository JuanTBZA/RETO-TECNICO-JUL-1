<!-- src/app/components/product-list/product-list.component.html -->
<div class="page-wrapper">
  <div class="page-header">
    <h1>Gestión de Productos</h1>
<button mat-raised-button color="primary" routerLink="/productos/nuevo">
  <mat-icon>add</mat-icon> Nuevo Producto
</button>
  </div>

  <!-- Filtros -->
  <mat-card class="filter-card">
    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="outline">
          <mat-label>Marca</mat-label>
          <input matInput [(ngModel)]="filtroMarca" placeholder="Ej: Dell"
                 (keyup.enter)="buscar()">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Modelo</mat-label>
          <input matInput [(ngModel)]="filtroModelo" placeholder="Ej: XPS 15"
                 (keyup.enter)="buscar()">
        </mat-form-field>

        <button mat-raised-button color="accent" (click)="buscar()">
          <mat-icon>search</mat-icon> Buscar
        </button>
        <button mat-stroked-button (click)="limpiarFiltro()">
          <mat-icon>clear</mat-icon> Limpiar
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Tabla -->
  <mat-card>
    <mat-card-content>
      <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <table mat-table [dataSource]="productos" class="full-width">

        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let p">{{ p.codigo }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="marca">
          <th mat-header-cell *matHeaderCellDef>Marca</th>
          <td mat-cell *matCellDef="let p">{{ p.marca }}</td>
        </ng-container>

        <ng-container matColumnDef="modelo">
          <th mat-header-cell *matHeaderCellDef>Modelo</th>
          <td mat-cell *matCellDef="let p">{{ p.modelo }}</td>
        </ng-container>

        <ng-container matColumnDef="precio">
          <th mat-header-cell *matHeaderCellDef>Precio (S/)</th>
          <td mat-cell *matCellDef="let p">{{ p.precio | number:'1.2-2' }}</td>
        </ng-container>

        <ng-container matColumnDef="stock">
          <th mat-header-cell *matHeaderCellDef>Stock</th>
          <td mat-cell *matCellDef="let p">{{ p.stock }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="primary" (click)="verDetalle(p)"
                    matTooltip="Ver detalle">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="accent" (click)="editar(p.idProducto)"
                    matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="confirmarEliminar(p)"
                    matTooltip="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
            No se encontraron productos
          </td>
        </tr>
      </table>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 20]"
        (page)="onPage($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
